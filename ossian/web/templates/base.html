<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Ossian{% endblock %}</title>
<style>
  :root{
    --blue:#2E6BE6; --blue-2:#4F8DF5; --blue-dark:#1B4FC0; --sky:#39B8E8;
    --blue-soft:#EAF1FD; --blue-wash:#F4F8FE;
    --ink:#18233B; --ink-2:#3A4A66; --muted:#6A7A99; --faint:#9AA7BF;
    --line:#E6ECF5; --line-2:#EEF2F9; --bg:#F3F7FD; --card:#FFFFFF;
    --green:#1F9D6B; --green-soft:#E6F7EF; --amber:#C77A20; --amber-soft:#FBF1E1;
    --red:#D2544B; --red-soft:#FCEDEC;
    --serif:'Fraunces',Georgia,'Times New Roman',serif;
    --mono:'IBM Plex Mono',ui-monospace,'Cascadia Code',Consolas,monospace;
    --sans:'Inter','Segoe UI',system-ui,-apple-system,Roboto,sans-serif;
    --sh-1:0 1px 2px rgba(24,35,59,.04),0 2px 8px rgba(46,107,230,.05);
    --sh-2:0 6px 24px rgba(46,107,230,.09);
    --sh-3:0 14px 46px rgba(27,79,192,.16);
    --r:16px; --r-sm:11px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;color:var(--ink);font-family:var(--sans);line-height:1.55;font-size:15px;
       background:
         radial-gradient(900px 500px at 12% -8%, #E4EEFF 0%, rgba(228,238,255,0) 55%),
         radial-gradient(760px 460px at 100% 0%, #E9F6FF 0%, rgba(233,246,255,0) 50%),
         var(--bg);
       background-attachment:fixed;-webkit-font-smoothing:antialiased}
  a{color:var(--blue);text-decoration:none} a:hover{color:var(--blue-dark)}
  ::selection{background:var(--blue-soft)}
  /* ---------- top nav ---------- */
  header.top{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;
       padding:13px 30px;background:rgba(255,255,255,.72);
       backdrop-filter:saturate(160%) blur(12px);border-bottom:1px solid var(--line)}
  header.top::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;
       background:linear-gradient(90deg,var(--blue),var(--sky))}
  .brandmark{display:flex;align-items:center;gap:10px}
  .brandmark .dot{width:30px;height:30px;border-radius:9px;
       background:linear-gradient(135deg,var(--blue),var(--sky));position:relative;
       box-shadow:0 4px 12px rgba(46,107,230,.4)}
  .brandmark .dot::after{content:"";position:absolute;inset:8px 8px auto 8px;height:6px;
       border-radius:6px;background:rgba(255,255,255,.9)}
  .brandmark .name{font-family:var(--serif);font-size:22px;letter-spacing:.2px}
  .brandmark .name b{background:linear-gradient(90deg,var(--blue),var(--sky));
       -webkit-background-clip:text;background-clip:text;color:transparent}
  header .tag{font-family:var(--mono);font-size:10.5px;color:var(--muted);
       text-transform:uppercase;letter-spacing:1.6px;padding-left:6px;border-left:1px solid var(--line)}
  header nav{margin-left:auto;display:flex;gap:8px;align-items:center}
  header nav a{font-family:var(--mono);font-size:11.5px;text-transform:uppercase;
       letter-spacing:1px;color:var(--muted);padding:7px 12px;border-radius:8px}
  header nav a:hover{background:var(--blue-soft);color:var(--blue-dark)}
  main{max-width:1120px;margin:0 auto;padding:34px 30px 10px}
  /* ---------- type ---------- */
  h1{font-family:var(--serif);font-weight:600;font-size:33px;line-height:1.12;
       margin:.15em 0 .12em;letter-spacing:-.4px}
  h2{font-family:var(--serif);font-weight:600;font-size:21px;margin:1.5em 0 .6em}
  h3{font-size:15px;margin:0 0 .3em}
  .eyebrow{font-family:var(--mono);font-size:11px;text-transform:uppercase;
       letter-spacing:2.4px;color:var(--blue);font-weight:500}
  .lead{color:var(--muted);font-size:16px;max-width:60ch}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  /* ---------- cards ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
       padding:22px 24px;margin:16px 0;box-shadow:var(--sh-1);
       transition:box-shadow .25s,transform .25s,border-color .25s}
  .card.hover:hover{box-shadow:var(--sh-2);transform:translateY(-2px);border-color:#D9E4F6}
  .grid{display:grid;gap:16px}
  .grid.c4{grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}
  .grid.c3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
  .grid.c2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
  /* ---------- stat ---------- */
  .stat{position:relative;background:var(--card);border:1px solid var(--line);
       border-radius:var(--r);padding:17px 19px;overflow:hidden;box-shadow:var(--sh-1)}
  .stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;
       background:linear-gradient(180deg,var(--blue),var(--sky))}
  .stat.g::before{background:linear-gradient(180deg,var(--green),#3FC98C)}
  .stat.a::before{background:linear-gradient(180deg,var(--amber),#E5A94B)}
  .stat .label{font-family:var(--mono);font-size:10px;text-transform:uppercase;
       letter-spacing:1.4px;color:var(--muted)}
  .stat .value{font-family:var(--serif);font-size:31px;margin-top:7px;line-height:1}
  .stat .sub{font-size:12px;color:var(--muted);margin-top:4px}
  /* ---------- buttons ---------- */
  .btn{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(180deg,var(--blue-2),var(--blue));
       color:#fff;border:0;border-radius:10px;padding:11px 18px;font-family:var(--mono);
       font-size:12px;letter-spacing:.4px;text-transform:uppercase;cursor:pointer;
       box-shadow:0 4px 14px rgba(46,107,230,.28);transition:transform .08s,box-shadow .22s,filter .2s;
       text-decoration:none;white-space:nowrap}
  .btn:hover{transform:translateY(-1.5px);box-shadow:0 8px 22px rgba(46,107,230,.36);color:#fff}
  .btn:active{transform:translateY(0)}
  .btn.ghost{background:#fff;color:var(--blue);border:1px solid #CFDDF6;box-shadow:none}
  .btn.ghost:hover{background:var(--blue-soft);box-shadow:none;color:var(--blue-dark)}
  .btn.sky{background:linear-gradient(180deg,#54C2ED,#2E9FD6);box-shadow:0 4px 14px rgba(57,184,232,.3)}
  .btn.green{background:linear-gradient(180deg,#33B981,#1F9D6B);box-shadow:0 4px 14px rgba(31,157,107,.28)}
  .btn.danger{background:#fff;color:var(--red);border:1px solid #F0C9C6;box-shadow:none}
  .btn.danger:hover{background:var(--red-soft);color:var(--red)}
  .btn.sm{padding:7px 13px;font-size:11px;border-radius:9px}
  .btn.tiny{padding:5px 10px;font-size:10px;border-radius:8px}
  .btn[disabled]{opacity:.6;cursor:not-allowed;transform:none!important}
  .btn .spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.5);
       border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
  .btn.loading .spin{display:inline-block} .btn.loading .lbl{opacity:.85}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* ---------- forms ---------- */
  input,select,textarea{font-family:var(--sans);font-size:14px;padding:11px 13px;
       border:1px solid var(--line);border-radius:10px;width:100%;background:#fff;color:var(--ink);
       transition:border-color .15s,box-shadow .15s}
  textarea{resize:vertical;line-height:1.5}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue-2);
       box-shadow:0 0 0 4px rgba(46,107,230,.13)}
  label.f{display:block;font-family:var(--mono);font-size:10.5px;text-transform:uppercase;
       letter-spacing:1px;color:var(--muted);margin:13px 0 5px}
  /* ---------- dropzone ---------- */
  .drop{border:2px dashed #C9D8F2;border-radius:var(--r);padding:26px;text-align:center;
       background:var(--blue-wash);transition:.2s;cursor:pointer}
  .drop:hover,.drop.drag{border-color:var(--blue);background:var(--blue-soft)}
  .drop .big{font-size:15px} .drop .files{margin-top:8px;font-size:12.5px;color:var(--blue-dark);
       font-family:var(--mono)}
  /* ---------- table ---------- */
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line-2);vertical-align:middle}
  thead th{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;
       color:var(--muted);background:var(--blue-wash);position:sticky;top:0}
  tbody tr{transition:background .12s} tbody tr:hover td{background:#FAFCFF}
  /* ---------- pills ---------- */
  .pill{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;
       text-transform:uppercase;letter-spacing:.5px;padding:3px 10px;border-radius:30px;
       border:1px solid var(--line);background:#fff;color:var(--muted);white-space:nowrap}
  .pill.kept{background:var(--green-soft);color:var(--green);border-color:#C5E9D6}
  .pill.duplicate{background:var(--amber-soft);color:var(--amber);border-color:#F0DCBB}
  .pill.empty,.pill.removed{background:#EEF1F7;color:var(--muted);border-color:var(--line)}
  .pill.short,.pill.invalid_rating,.pill.invalid_date,.pill.invalid_numeric,.pill.broken_extraction,
  .pill.missing_participant_meta{background:var(--amber-soft);color:var(--amber);border-color:#F0DCBB}
  .pill.teal,.pill.b{background:var(--blue-soft);color:var(--blue-dark);border-color:#CBDCF8}
  .pill.dot::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  /* ---------- misc ---------- */
  .flex{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .between{justify-content:space-between} .wrap{flex-wrap:wrap}
  .scroll{overflow-x:auto;border-radius:var(--r)}
  code{font-family:var(--mono);font-size:12px;background:var(--blue-soft);color:var(--blue-dark);
       padding:1.5px 6px;border-radius:5px}
  .divider{height:1px;background:var(--line);margin:14px 0}
  /* ---------- before/after ---------- */
  .diff{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .diff>div{padding:13px 15px;font-size:14px}
  .diff .before{background:#FCFDFE;border-right:1px solid var(--line)}
  .diff .after{background:var(--blue-wash)}
  .diff .h{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:1.2px;
       color:var(--muted);margin-bottom:7px;display:flex;gap:6px;align-items:center}
  /* ---------- AI note ---------- */
  .ai{background:linear-gradient(180deg,var(--blue-soft),#F6FAFF);border:1px solid #D5E3FB;
       border-left:3px solid var(--blue);padding:11px 14px;border-radius:0 12px 12px 0;
       font-size:13px;margin-top:10px}
  .ai .lab{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:1.2px;
       color:var(--blue);display:inline-flex;gap:6px;align-items:center;margin-bottom:3px}
  .ai .lab{color:var(--blue)}
  /* ---------- governance ---------- */
  .gov{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .gov .col{border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .gov .col.can{background:var(--green-soft);border-color:#C5E9D6}
  .gov .col.no{background:var(--red-soft);border-color:#F2D3D0}
  .gov h3{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:1px}
  .gov ul{margin:8px 0 0;padding-left:16px} .gov li{margin:4px 0;font-size:13px}
  /* ---------- score ring ---------- */
  .ring-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .ring{position:relative;width:150px;height:150px;flex:none}
  .ring svg{transform:rotate(-90deg)}
  .ring .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
       justify-content:center}
  .ring .num b{font-family:var(--serif);font-size:40px;line-height:1;
       background:linear-gradient(90deg,var(--blue),var(--sky));-webkit-background-clip:text;
       background-clip:text;color:transparent}
  .ring .num span{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
  /* ---------- stepper ---------- */
  .steps{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0 4px}
  .steps .s{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;
       color:var(--muted);padding:6px 12px;border-radius:30px;background:#fff;border:1px solid var(--line)}
  .steps .s b{width:19px;height:19px;border-radius:50%;background:var(--line);color:#fff;
       display:grid;place-items:center;font-size:10px}
  .steps .s.done{color:var(--green);border-color:#C5E9D6;background:var(--green-soft)}
  .steps .s.done b{background:var(--green)}
  .steps .s.active{color:var(--blue-dark);border-color:#CBDCF8;background:var(--blue-soft)}
  .steps .s.active b{background:var(--blue)}
  /* ---------- toast ---------- */
  #toasts{position:fixed;right:20px;bottom:20px;z-index:80;display:flex;flex-direction:column;gap:10px}
  .toast{background:var(--ink);color:#fff;padding:12px 16px;border-radius:11px;font-size:13.5px;
       box-shadow:var(--sh-3);display:flex;gap:10px;align-items:center;
       animation:slidein .35s cubic-bezier(.2,.9,.3,1.2);max-width:340px}
  .toast.ok{background:linear-gradient(180deg,#1FA873,#1a8e61)}
  .toast.err{background:linear-gradient(180deg,#D2544B,#b8443c)}
  @keyframes slidein{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}
  /* ---------- modal ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(24,35,59,.44);backdrop-filter:blur(3px);
       z-index:90;display:none;align-items:center;justify-content:center;padding:20px}
  .modal-bg.show{display:flex;animation:fade .2s}
  .modal{background:#fff;border-radius:18px;padding:26px;max-width:420px;width:100%;
       box-shadow:var(--sh-3);animation:pop .25s cubic-bezier(.2,.9,.3,1.15)}
  .modal h3{font-family:var(--serif);font-size:20px;margin:0 0 8px}
  @keyframes fade{from{opacity:0}} @keyframes pop{from{transform:scale(.94);opacity:0}}
  /* ---------- reveal ---------- */
  .reveal{opacity:0;transform:translateY(12px)}
  .reveal.in{opacity:1;transform:none;transition:opacity .5s ease,transform .5s cubic-bezier(.2,.7,.3,1)}
  .foot{color:var(--faint);font-size:12px;text-align:center;padding:38px 0 20px;font-family:var(--mono)}
  @media(max-width:680px){.diff,.gov{grid-template-columns:1fr}main{padding:24px 18px}}
</style>
</head>
<body>
<header class="top">
  <a class="brandmark" href="/">
    <span class="dot"></span>
    <span class="name">Oss<b>ian</b></span>
  </a>
  <span class="tag">Customer understanding platform</span>
  <nav><a href="/">Dashboard</a></nav>
</header>
<main>
  {% block body %}{% endblock %}
</main>
<div class="foot">Ossian · Turn scattered evidence into a defensible dataset</div>

<div id="toasts"></div>
<div class="modal-bg" id="modalbg">
  <div class="modal">
    <h3 id="modalTitle">Are you sure?</h3>
    <p class="muted" id="modalBody" style="margin:.2em 0 18px"></p>
    <div class="flex between">
      <button class="btn ghost" type="button" onclick="Oss.closeModal()">Cancel</button>
      <button class="btn danger" type="button" id="modalOk">Delete</button>
    </div>
  </div>
</div>

<script>
const Oss = {
  toast(msg, type){ const t=document.createElement('div'); t.className='toast '+(type||'');
    t.textContent=msg; document.getElementById('toasts').appendChild(t);
    setTimeout(()=>{t.style.transition='opacity .4s,transform .4s';t.style.opacity='0';
      t.style.transform='translateY(10px)';setTimeout(()=>t.remove(),400)},2600); },
  _modalCb:null,
  confirm(title, body, cb){ document.getElementById('modalTitle').textContent=title;
    document.getElementById('modalBody').textContent=body||''; this._modalCb=cb;
    document.getElementById('modalbg').classList.add('show'); },
  closeModal(){ document.getElementById('modalbg').classList.remove('show'); this._modalCb=null; },
};
document.getElementById('modalOk').onclick=()=>{ if(Oss._modalCb) Oss._modalCb(); Oss.closeModal(); };
document.getElementById('modalbg').addEventListener('click',e=>{ if(e.target.id==='modalbg') Oss.closeModal(); });

document.addEventListener('DOMContentLoaded',()=>{
  // staggered reveal
  const io=new IntersectionObserver((es)=>es.forEach((e,i)=>{ if(e.isIntersecting){
    setTimeout(()=>e.target.classList.add('in'), (e.target.dataset.delay||0)*1);
    io.unobserve(e.target);} }),{threshold:.06});
  document.querySelectorAll('.reveal').forEach((el,i)=>{el.dataset.delay=Math.min(i*45,300);io.observe(el);});

  // count-up
  const cu=new IntersectionObserver((es)=>es.forEach(e=>{ if(!e.isIntersecting)return;
    const el=e.target, to=parseFloat(el.dataset.countup), dec=(el.dataset.dec|0);
    let t0=null, dur=850; const step=(t)=>{ t0=t0||t; const p=Math.min((t-t0)/dur,1);
      const v=to*(1-Math.pow(1-p,3)); el.textContent=v.toLocaleString(undefined,
        {minimumFractionDigits:dec,maximumFractionDigits:dec}); if(p<1)requestAnimationFrame(step);
      else el.textContent=to.toLocaleString(undefined,{minimumFractionDigits:dec,maximumFractionDigits:dec}); };
    requestAnimationFrame(step); cu.unobserve(el); }),{threshold:.4});
  document.querySelectorAll('[data-countup]').forEach(el=>cu.observe(el));

  // score ring
  document.querySelectorAll('.ring[data-score]').forEach(r=>{
    const s=Math.max(0,Math.min(100,parseFloat(r.dataset.score))), R=64, C=2*Math.PI*R;
    r.innerHTML=`<svg width="150" height="150" viewBox="0 0 150 150">
      <defs><linearGradient id="rg${s}" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#2E6BE6"/><stop offset="1" stop-color="#39B8E8"/></linearGradient></defs>
      <circle cx="75" cy="75" r="${R}" fill="none" stroke="#E9EEF7" stroke-width="12"/>
      <circle cx="75" cy="75" r="${R}" fill="none" stroke="url(#rg${s})" stroke-width="12"
        stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C}"
        style="transition:stroke-dashoffset 1.1s cubic-bezier(.3,.8,.3,1)"/></svg>
      <div class="num"><b>${s}</b><span>/ 100</span></div>`;
    requestAnimationFrame(()=>{ const c=r.querySelectorAll('circle')[1];
      c.style.strokeDashoffset = C*(1-s/100); });
  });

  // dropzone
  document.querySelectorAll('[data-drop]').forEach(z=>{
    const input=z.querySelector('input[type=file]'), out=z.querySelector('.files');
    z.addEventListener('click',()=>input.click());
    z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drag');});
    z.addEventListener('dragleave',()=>z.classList.remove('drag'));
    z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('drag');
      input.files=e.dataTransfer.files; show();});
    input.addEventListener('change',show);
    function show(){ const n=input.files.length; out.textContent = n? [...input.files].map(f=>f.name).join(', ') : ''; }
  });

  // loading state on submit
  document.querySelectorAll('form[data-loading]').forEach(f=>{
    f.addEventListener('submit',()=>{ const b=f.querySelector('button[type=submit],button:not([type])');
      if(b){b.classList.add('loading');b.disabled=true;} });
  });

  // live filter
  document.querySelectorAll('[data-filter]').forEach(inp=>{
    inp.addEventListener('input',()=>{ const q=inp.value.toLowerCase();
      const scope=document.querySelector(inp.dataset.filter);
      let shown=0;
      scope.querySelectorAll('[data-row]').forEach(row=>{
        const hit=row.textContent.toLowerCase().includes(q); row.style.display=hit?'':'none'; if(hit)shown++; });
      const c=document.querySelector(inp.dataset.count); if(c)c.textContent=shown;
    });
  });

  // confirm-delete forms
  document.querySelectorAll('form[data-confirm]').forEach(f=>{
    f.addEventListener('submit',e=>{ if(f.dataset._ok)return; e.preventDefault();
      Oss.confirm(f.dataset.confirmTitle||'Delete?', f.dataset.confirm, ()=>{f.dataset._ok=1;f.submit();}); });
  });

  // inline unit edit (dynamic, no reload)
  document.querySelectorAll('[data-unit]').forEach(card=>{
    const uid=card.dataset.unit, sid=card.dataset.src;
    const ta=card.querySelector('.edit-text');
    async function call(op){ const r=await fetch(`/sources/${sid}/units/${uid}/edit`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({op, cleaned_text: ta?ta.value:null})});
      const j=await r.json(); return j; }
    const saveBtn=card.querySelector('[data-op=save]');
    if(saveBtn) saveBtn.onclick=async()=>{ await call('save'); Oss.toast('Edit saved','ok'); };
    const rmBtn=card.querySelector('[data-op=remove]');
    if(rmBtn) rmBtn.onclick=async()=>{ const j=await call('remove');
      card.dataset.status=j.status; card.querySelector('.st').className='pill '+j.status;
      card.querySelector('.st').textContent=j.status; Oss.toast('Unit removed','ok');
      rmBtn.style.display='none'; const rs=card.querySelector('[data-op=restore]'); if(rs)rs.style.display=''; };
    const rsBtn=card.querySelector('[data-op=restore]');
    if(rsBtn) rsBtn.onclick=async()=>{ const j=await call('restore');
      card.dataset.status=j.status; card.querySelector('.st').className='pill '+j.status;
      card.querySelector('.st').textContent=j.status; Oss.toast('Unit restored','ok');
      rsBtn.style.display='none'; const rm=card.querySelector('[data-op=remove]'); if(rm)rm.style.display=''; };
  });
});
</script>
</body>
</html>
